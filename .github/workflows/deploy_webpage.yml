name: Deploy site to Pages

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        id: pages

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ hashFiles('**/requirements*.txt') }}-${{ github.run_id }}
          path: ~/.cache/pip
          restore-keys: |
            mkdocs-material-

      - name: Install Python dependencies
        run: pip install mkdocs-material pyyaml

      - name: Generate publications
        run: python scripts/generate_publications.py

      - name: Build HTML
        run: mkdocs build --site-dir site

      - name: Install Typst
        run: |
          TYPST_VERSION=$(curl -s https://api.github.com/repos/typst/typst/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSL "https://github.com/typst/typst/releases/download/${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" \
            | tar -xJ --strip-components=1 -C /usr/local/bin typst-x86_64-unknown-linux-musl/typst

      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-roboto
          curl -sSL "https://github.com/adobe-fonts/source-sans/releases/latest/download/OTF-source-sans-3.zip" \
            -o /tmp/source-sans.zip
          unzip -q /tmp/source-sans.zip -d /tmp/source-sans
          sudo mkdir -p /usr/local/share/fonts/source-sans
          find /tmp/source-sans -name "*.otf" | xargs -I{} sudo cp {} /usr/local/share/fonts/source-sans/
          sudo fc-cache -f

      - name: Cache Typst packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/typst/packages
          key: typst-packages-${{ hashFiles('CV/cv.typ') }}
          restore-keys: |
            typst-packages-

      - name: Compile CV
        run: typst compile CV/cv.typ CV/cv.pdf --font-path=CV/fonts

      - name: Copy CV to site
        run: cp CV/cv.pdf site/cv.pdf

      - name: Add .nojekyll
        run: touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
