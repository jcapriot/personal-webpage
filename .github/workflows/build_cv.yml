name: Build CV

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Generate publications
        run: python scripts/generate_publications.py

      - name: Install Typst
        run: |
          TYPST_VERSION=$(curl -s https://api.github.com/repos/typst/typst/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSL "https://github.com/typst/typst/releases/download/${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" \
            | tar -xJ --strip-components=1 -C /usr/local/bin typst-x86_64-unknown-linux-musl/typst

      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-roboto
          SOURCE_SANS_URL=$(curl -s https://api.github.com/repos/adobe-fonts/source-sans/releases/latest \
            | grep "browser_download_url" | grep "OTF" | grep "\.zip" | head -1 | cut -d'"' -f4)
          curl -sSL "$SOURCE_SANS_URL" -o /tmp/source-sans.zip
          unzip -q /tmp/source-sans.zip -d /tmp/source-sans
          sudo mkdir -p /usr/local/share/fonts/source-sans
          find /tmp/source-sans -name "*.otf" | xargs -I{} sudo cp {} /usr/local/share/fonts/source-sans/
          sudo fc-cache -f

      - name: Cache Typst packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/typst/packages
          key: typst-packages-${{ hashFiles('CV/cv.typ') }}
          restore-keys: |
            typst-packages-

      - name: Compile CV
        run: typst compile CV/cv.typ CV/cv.pdf --font-path=CV/fonts

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV
          path: CV/cv.pdf
